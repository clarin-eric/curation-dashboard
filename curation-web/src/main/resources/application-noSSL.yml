# properties are documented in the application.yml of the curation-app module
spring:
  datasource:
    url: ${DATABASE_URI}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MariaDBDialect
  cache:
    jcache:
      config: classpath:ehcache.xml
  servlet:
    multipart:
      enabled: true
      location: ${java.io.tmpdir}
  mvc:
    async:
      request-timeout: 3600000
server:
  error:
    include-stacktrace: always

curation:
  cr-service:
    restApi: "https://catalog.clarin.eu/ds/ComponentRegistry/rest/registry/1.x/profiles"
    query: "?registrySpace=published&status=production&status=development&&status=deprecated"
  ccr-service:
    clavas-request: https://vocabularies.clarin.eu/clavas/rest/v1/data?uri=${conceptURI}
    wikidata-request: https://query.wikidata.org/bigdata/namespace/wdq/sparql?query=SELECT%20%3Flabel%20WHERE%20%7Bwd%3A${entityID}%20rdfs%3Alabel%20%3Flabel%20%20FILTER%20%28lang%28%3Flabel%29%20IN%20%28%22en%22%29%29%7D
  facets:
    - languageCode
    - collection
    - resourceClass
    - modality
    - format
    - keywords
    - genre
    - subject
    - country
    - organisation
    - name
    - description
    - license
    - availability
    - temporalCoverage
  clientUsername: curation
  directory:
    home: ${APPLICATION_HOME_DIRECTORY}
    dataRoot: ${APPLICATION_HOME_DIRECTORY}/data
    in: >
      ${APPLICATION_HOME_DIRECTORY}/data/clarin/results/cmdi
    out: ${APPLICATION_HOME_DIRECTORY}/public
    share: /data
  max_file_size: 100MB
  mode: instance
  doc-url: "https://raw.githubusercontent.com/clarin-eric/cereal/dev/curation-dashboard/markdown"
logging:
  level:
    root: ERROR