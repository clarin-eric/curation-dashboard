<div class="container-fluid">
    <div id="validatorTabPanel" class="shadow p-3 mb-5 bg-body-tertiary rounded border border-2">
        <ul class="nav nav-tabs" id="validatorTabList" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="file-tab" data-bs-toggle="tab" data-bs-target="#file-tab-pane" type="button" role="tab" aria-controls="file-tab-pane" aria-selected="true">Upload file</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="url-tab" data-bs-toggle="tab" data-bs-target="#url-tab-pane" type="button" role="tab" aria-controls="url-tab-pane" aria-selected="false">Submit URL</button>
            </li>
        </ul>
        <div class="tab-content" id="validatorTabContent">
            <div class="tab-pane fade show active" id="file-tab-pane" role="tabpanel" aria-labelledby="file-tab" tabindex="0">
                <div class="row">
                    <button class="col-xs-12 btn-default dropzone" id="cmdi-dropzone">
                        <div class="dz-message">
                            Drag a CMD record / CMD profile here or click to open file browser
                        </div>
                    </button>
                </div>
            </div>
            <div class="tab-pane fade" id="url-tab-pane" role="tabpanel" aria-labelledby="home-tab" tabindex="0">
                <div class="row mt-5 mb-5">
                    <div class="col-8">
                        <form action="/validator" id="urlForm">
                            <input class="form-control" type="text" placeholder="CMD record URL / CMD profile URL"
                                   id="url-input"
                                   name="url-input" required>
                        </form>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-primary" id="validateButton" type="submit" form="urlForm">Validate</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
	<div class="row mt-5 mb-5" hidden="true" id="validatorSpinner">
		<span>Validating...</span>
		<div class="spinner-border" role="status">

		</div>
	</div>
</div>
