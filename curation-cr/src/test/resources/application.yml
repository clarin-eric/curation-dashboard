# properties are documented in the application.yml of the curation-app module
# ATTENTION: this application.yml is only for testing. It uses http requests instead of https to avoid certificate issues with MockServer
logging:
   level:
      root: ERROR
curation:
   cr-service:
      cr-cache: ${java.io.tmpdir}/curation/cr_cache
      restApi: "http://catalog.clarin.eu/ds/ComponentRegistry/rest/registry/1.x/profiles"
      query: "?registrySpace=published&status=production&status=development&&status=deprecated"
   ccr-service:
      ccr-cache: ${java.io.tmpdir}/curation/ccr_cache
      clavas-request: http://vocabularies.clarin.eu/clavas/rest/v1/data?uri=${conceptURI}
      wikidata-request: http://query.wikidata.org/bigdata/namespace/wdq/sparql?query=SELECT%20%3Flabel%20WHERE%20%7Bwd%3A${entityID}%20rdfs%3Alabel%20%3Flabel%20%20FILTER%20%28lang%28%3Flabel%29%20IN%20%28%22en%22%29%29%7D
   http:
      proxy-host: 127.0.0.1
      proxy-port: ${mockServerPort}
      user-agent: "CLARIN-curation-dashboard"
      connection-timeout: 5000
      read-timeout: 5000
spring:
   cache:
      jcache:
         config: classpath:ehcache.xml